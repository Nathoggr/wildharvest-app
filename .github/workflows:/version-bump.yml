name: Auto Version Bump

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'manifest.json'
      - 'icon-*.png'
      - 'screenshot-*.png'

jobs:
  bump-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Bump version timestamp
        run: |
          TIMESTAMP=$(date +%s)
          sed -i "s/const CACHE = 'wildharvest-v[^']*'/const CACHE = 'wildharvest-v$TIMESTAMP'/" index.html
          echo "Bumped cache to wildharvest-v$TIMESTAMP"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "chore: auto bump cache version [skip ci]"
          git push